<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Free App Audit — AppMonitor</title>
<link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin/>
<link href="https://fonts.cdnfonts.com/css/gilroy-bold" rel="stylesheet"/>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
/* ===== TOKENS ===== */
:root {
  --bg: #F5F6FA;
  --surface: #FFFFFF;
  --surface-2: #F9FAFB;
  --surface-3: #F1F5F9;
  --border: #E5E7EB;
  --border-strong: #D1D5DB;
  --text: #111827;
  --text-muted: #6B7280;
  --text-faint: #9CA3AF;
  --primary: #4B5BD6;
  --primary-dark: #1D2968;
  --primary-soft: #E8ECFB;
  --success: #22C55E;
  --error: #EF4444;
  --warning: #F59E0B;
  --grad: linear-gradient(135deg, #1D2968 0%, #4B5BD6 100%);
  --grad-hero: linear-gradient(150deg, #0f1d5e 0%, #1D2968 40%, #2e3f9e 100%);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-pill: 99px;
  --shadow: 0 4px 20px rgba(29,41,104,.10);
  --shadow-lg: 0 12px 40px rgba(29,41,104,.18);
  --topbar-h: 64px;
}
[data-theme="dark"] {
  --bg: #0D0F1A;
  --surface: #161929;
  --surface-2: #1C1F33;
  --surface-3: #232640;
  --border: #2A2E4A;
  --border-strong: #363B5E;
  --text: #F1F5F9;
  --text-muted: #94A3B8;
  --text-faint: #64748B;
  --primary-soft: #1e2255;
  --shadow: 0 4px 20px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.6);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Gilroy', 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
a { text-decoration: none; }
svg { display: block; }

/* ===== TOPBAR ===== */
.topbar {
  position: sticky; top: 0; z-index: 100;
  height: var(--topbar-h);
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 clamp(16px, 5vw, 60px);
  gap: 16px;
}
[data-theme="dark"] .topbar { background: rgba(13,15,26,.88); }
.brand { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 18px; color: var(--text); }
.brand-p { color: var(--primary); }
.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.btn-demo {
  background: var(--grad); color: #fff; border: none;
  border-radius: var(--radius-pill); padding: 9px 22px;
  font-size: 13.5px; font-weight: 700; font-family: inherit;
  transition: opacity .15s;
}
.btn-demo:hover { opacity: .88; }
.icon-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; display: grid; place-items: center; color: var(--text-muted); transition: background .15s; }
.icon-btn:hover { background: var(--surface-3); }
.icon-btn svg { width: 16px; height: 16px; }

/* ===== MAIN CONTENT ===== */
.content { max-width: 820px; margin: 0 auto; padding: 0 clamp(16px, 4vw, 40px) 80px; }

/* ===== HERO ===== */
.hero {
  background: var(--grad-hero);
  margin: 0 -60px;
  padding: clamp(48px, 8vw, 80px) clamp(24px, 5vw, 80px);
  text-align: center;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 110%, rgba(99,102,241,.35) 0%, transparent 70%);
  pointer-events: none;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  border-radius: var(--radius-pill); padding: 5px 14px;
  font-size: 12px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: rgba(255,255,255,.9);
  margin-bottom: 20px;
}
.hero-badge svg { width: 12px; height: 12px; }
.hero h1 { font-size: clamp(28px, 5vw, 48px); font-weight: 900; line-height: 1.15; margin-bottom: 14px; }
.hero h1 span { color: #93C5FD; }
.hero-sub { font-size: clamp(14px, 2vw, 17px); opacity: .78; max-width: 520px; margin: 0 auto 32px; line-height: 1.6; }

/* ===== HERO SEARCH ===== */
.hero-search {
  background: rgba(255,255,255,.12);
  border: 1.5px solid rgba(255,255,255,.25);
  border-radius: 20px;
  padding: 20px 22px 18px;
  max-width: 580px;
  margin: 0 auto;
  backdrop-filter: blur(12px);
  position: relative; z-index: 1;
}
.hero-search-label { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.6); margin-bottom: 10px; }
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: rgba(255,255,255,.5); pointer-events: none; }
.search-input {
  width: 100%; height: 52px;
  background: rgba(255,255,255,.13);
  border: 1.5px solid rgba(255,255,255,.2);
  border-radius: var(--radius-pill);
  color: #fff; font-size: 15px; font-family: inherit;
  padding: 0 16px 0 46px;
  transition: border-color .15s, background .15s;
}
.search-input::placeholder { color: rgba(255,255,255,.4); }
.search-input:focus { outline: none; border-color: rgba(255,255,255,.55); background: rgba(255,255,255,.18); }
.search-dd {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  overflow: hidden; z-index: 50;
  display: none;
}
.search-dd.open { display: block; }
.dd-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; cursor: pointer; transition: background .12s; }
.dd-item:hover { background: var(--surface-2); }
.dd-item img { width: 36px; height: 36px; border-radius: 9px; object-fit: cover; flex: none; }
.dd-item-icon { width: 36px; height: 36px; border-radius: 9px; background: var(--surface-3); display: grid; place-items: center; flex: none; font-size: 18px; }
.dd-item-name { font-size: 13.5px; font-weight: 700; }
.dd-item-dev { font-size: 11.5px; color: var(--text-muted); }
.dd-loader { padding: 14px 16px; color: var(--text-muted); font-size: 13px; display: flex; align-items: center; gap: 8px; }

.quick-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px; justify-content: center; }
.chip {
  padding: 5px 14px;
  background: rgba(255,255,255,.14);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: var(--radius-pill);
  color: rgba(255,255,255,.88);
  font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: background .15s;
}
.chip:hover { background: rgba(255,255,255,.24); }

/* ===== HOW IT WORKS ===== */
.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 44px 0 8px; position: relative; }
@media (max-width: 600px) { .steps { grid-template-columns: 1fr; gap: 28px; } }
.step { text-align: center; opacity: 0; transform: translateY(18px); animation: stepIn .6s cubic-bezier(.22,.61,.36,1) forwards; animation-delay: var(--d, 0s); }
@media (prefers-reduced-motion: reduce) { .step { opacity: 1; transform: none; animation: none; } .step-art * { animation: none !important; } }
@keyframes stepIn { to { opacity: 1; transform: translateY(0); } }
.step-art {
  position: relative; width: 100%; max-width: 156px; height: 100px;
  margin: 0 auto 16px; border-radius: 16px;
  display: grid; place-items: center; overflow: hidden;
  border: 1px solid var(--border);
  transition: transform .28s cubic-bezier(.22,.61,.36,1), box-shadow .28s, border-color .28s;
}
.step:hover .step-art { transform: translateY(-5px); box-shadow: var(--shadow); border-color: var(--border-strong); }
.step-art svg { width: 100%; height: 100%; display: block; }
.art-1 { background: linear-gradient(160deg, #EEF1FE 0%, #E0E6FB 100%); }
.art-2 { background: linear-gradient(160deg, #FEF4E6 0%, #FCE9CC 100%); }
.art-3 { background: linear-gradient(160deg, #E7F7EF 0%, #D2F0E0 100%); }
[data-theme="dark"] .art-1 { background: linear-gradient(160deg, #1b1f44 0%, #232a5e 100%); }
[data-theme="dark"] .art-2 { background: linear-gradient(160deg, #3a2c12 0%, #4a3a18 100%); }
[data-theme="dark"] .art-3 { background: linear-gradient(160deg, #12362a 0%, #184a38 100%); }
.step-chip {
  position: absolute; top: 9px; left: 9px;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--surface); color: var(--primary);
  font-size: 11.5px; font-weight: 900;
  display: grid; place-items: center; box-shadow: var(--shadow); z-index: 3;
}
.step-title { font-size: 14px; font-weight: 800; margin-bottom: 5px; }
.step-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; }
/* step illustration micro-animations */
@keyframes magPulse { 0%,100% { transform: translate(0,0); } 50% { transform: translate(2px,-2px); } }
@keyframes caretBlink { 0%,45% { opacity: 1; } 55%,100% { opacity: 0; } }
@keyframes tilepop { 0%,18% { opacity: 0; transform: translateY(5px); } 32%,86% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(5px); } }
@keyframes barGrow { 0% { transform: scaleY(.12); } 55%,100% { transform: scaleY(1); } }
@keyframes trendDraw { 0% { stroke-dashoffset: 120; } 60%,100% { stroke-dashoffset: 0; } }
@keyframes dotRise { 0%,50% { opacity: 0; transform: translateY(6px); } 70%,100% { opacity: 1; transform: translateY(0); } }
@keyframes sparkle { 0%,60%,100% { opacity: 0; transform: scale(.4); } 78% { opacity: 1; transform: scale(1); } }
.a-mag { animation: magPulse 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
.a-caret { animation: caretBlink 1.1s steps(1) infinite; }
.a-tile { animation: tilepop 3.4s ease-in-out infinite; transform-box: fill-box; }
.a-bar { transform-box: fill-box; transform-origin: bottom; animation: barGrow 2.8s cubic-bezier(.22,.61,.36,1) infinite; }
.a-trend { stroke-dasharray: 120; animation: trendDraw 3s ease-in-out infinite; }
.a-dot { transform-box: fill-box; animation: dotRise 3s ease-in-out infinite; }
.a-spark { transform-box: fill-box; transform-origin: center; animation: sparkle 3s ease-in-out infinite; }

/* ===== PAGE SECTIONS ===== */
.section-head { padding: 36px 0 20px; }
.section-head h2 { font-size: 22px; font-weight: 900; margin-bottom: 5px; }
.section-head p { font-size: 14px; color: var(--text-muted); }
.eyebrow { font-size: 11px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; color: var(--primary); margin-bottom: 6px; }

/* ===== APP RESULT CARDS ===== */
.results-grid { display: flex; flex-direction: column; gap: 12px; }
.app-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  transition: box-shadow .18s, border-color .18s;
  cursor: pointer;
}
.app-card:hover { box-shadow: var(--shadow); border-color: var(--border-strong); }
.app-icon { width: 56px; height: 56px; border-radius: 13px; object-fit: cover; flex: none; background: var(--surface-3); }
.app-icon-fallback { width: 56px; height: 56px; border-radius: 13px; background: var(--surface-3); display: grid; place-items: center; font-size: 26px; flex: none; }
.app-info { flex: 1; min-width: 0; }
.app-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.app-dev { font-size: 12px; color: var(--text-muted); margin-bottom: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.app-meta { display: flex; align-items: center; gap: 12px; }
.meta-item { display: flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 600; color: var(--text-muted); }
.meta-item svg { width: 13px; height: 13px; }
.star-icon { color: #FBBF24; }
.vbadge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: var(--radius-pill);
}
.vbadge svg { width: 11px; height: 11px; }
.card-ctas { display: flex; gap: 8px; flex-direction: column; align-items: flex-end; }
@media (max-width: 540px) { .app-card { flex-wrap: wrap; } .card-ctas { flex-direction: row; width: 100%; } }
.cta-cat {
  background: transparent; border: 1.5px solid var(--primary);
  color: var(--primary); border-radius: var(--radius-pill);
  font-size: 11.5px; font-weight: 700; font-family: inherit;
  padding: 7px 14px; white-space: nowrap; transition: background .13s;
}
.cta-cat:hover { background: var(--primary-soft); }
.cta-issues {
  background: linear-gradient(135deg, #EF4444, #F97316);
  border: none; color: #fff;
  border-radius: var(--radius-pill);
  font-size: 11.5px; font-weight: 700; font-family: inherit;
  padding: 7px 14px; white-space: nowrap; transition: opacity .13s;
}
.cta-issues:hover { opacity: .87; }

/* ===== AUDIT PAGE ===== */
.audit-app-head {
  display: flex; align-items: center; gap: 16px;
  padding: 28px 0 22px; border-bottom: 1px solid var(--border);
  margin-bottom: 28px; flex-wrap: wrap; gap: 14px;
}
.audit-icon { width: 72px; height: 72px; border-radius: 18px; object-fit: cover; flex: none; background: var(--surface-3); }
.audit-icon-fallback { width: 72px; height: 72px; border-radius: 18px; background: var(--surface-3); display: grid; place-items: center; font-size: 34px; flex: none; }
.audit-app-name { font-size: 22px; font-weight: 900; margin-bottom: 3px; }
.audit-app-dev { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
.audit-actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
.btn-ghost {
  background: none; border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius-pill);
  font-family: inherit; font-size: 13px; font-weight: 600;
  padding: 8px 16px; display: flex; align-items: center; gap: 6px;
  transition: background .13s;
}
.btn-ghost:hover { background: var(--surface-2); }
.btn-ghost svg { width: 14px; height: 14px; }

/* ===== CATEGORY COMPARE ===== */
.compare-section { margin-bottom: 32px; }
.section-title { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.section-title h3 { font-size: 18px; font-weight: 900; }
.accent-bar { width: 4px; height: 22px; border-radius: 2px; flex: none; }
.rank-hero {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 22px;
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.rank-big { font-size: 48px; font-weight: 900; color: var(--primary); line-height: 1; }
.rank-label { font-size: 13.5px; color: var(--text-muted); margin-top: 4px; }
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
@media (max-width: 520px) { .metric-grid { grid-template-columns: 1fr 1fr; } }
.metric-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px;
}
.metric-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.metric-label svg { width: 12px; height: 12px; }
.metric-val { font-size: 20px; font-weight: 900; }
.metric-vs { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 4px; }
.metric-vs svg { width: 12px; height: 12px; }
.up { color: var(--success); }
.down { color: var(--error); }
.neutral { color: var(--text-muted); }

/* Leaderboard */
.leaderboard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.lb-head { display: grid; grid-template-columns: 36px 1fr 70px 70px; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); }
.lb-row { display: grid; grid-template-columns: 36px 1fr 70px 70px; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid var(--border); transition: background .12s; }
.lb-row:last-child { border-bottom: none; }
.lb-row:hover { background: var(--surface-2); }
.lb-row.is-target { background: color-mix(in srgb, var(--primary) 7%, transparent); border-left: 3px solid var(--primary); }
.lb-rank { font-size: 13px; font-weight: 900; color: var(--text-muted); text-align: center; }
.lb-rank.gold { color: #FBBF24; }
.lb-rank.silver { color: #94A3B8; }
.lb-rank.bronze { color: #CD7F32; }
.lb-app { display: flex; align-items: center; gap: 9px; min-width: 0; }
.lb-icon { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; flex: none; background: var(--surface-3); }
.lb-icon-fb { width: 32px; height: 32px; border-radius: 8px; background: var(--surface-3); display: grid; place-items: center; font-size: 16px; flex: none; }
.lb-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-dev { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-stat { font-size: 12.5px; font-weight: 700; text-align: right; }
.lb-rating { display: flex; align-items: center; gap: 3px; justify-content: flex-end; }
.lb-rating svg { width: 12px; height: 12px; color: #FBBF24; }

/* ===== ISSUE CATS ===== */
.issues-section { margin-bottom: 32px; }
.issue-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 9px; overflow: hidden; }
.issue-card-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; user-select: none; }
.issue-card-head:hover { background: var(--surface-2); }
.issue-icon { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; flex: none; }
.issue-icon svg { width: 15px; height: 15px; }
.issue-title { font-size: 13.5px; font-weight: 800; flex: 1; }
.issue-badge { font-size: 11.5px; font-weight: 800; padding: 3px 10px; border-radius: var(--radius-pill); }
.issue-chevron svg { width: 15px; height: 15px; color: var(--text-faint); transition: transform .22s; }
.issue-chevron.open svg { transform: rotate(180deg); }
.issue-body { max-height: 0; overflow: hidden; transition: max-height .35s cubic-bezier(.4,0,.2,1); }
.issue-body.open { max-height: 800px; }
.issue-body-inner { padding: 0 16px 16px; }
.issue-bar-label { font-size: 11.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
.issue-bar-track { height: 7px; border-radius: 99px; background: var(--surface-3); overflow: hidden; margin-bottom: 14px; }
.issue-bar-fill { height: 100%; border-radius: 99px; }
.issue-quote { background: var(--surface-2); border-left: 3px solid var(--border-strong); border-radius: 0 8px 8px 0; padding: 10px 13px; margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
.issue-quote:last-child { margin-bottom: 0; }
.q-meta { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
.no-issues { text-align: center; padding: 28px 0; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 8px; }
.no-issues svg { width: 32px; height: 32px; color: var(--success); }

/* ===== CTA BLOCK ===== */
.fix-cta {
  background: var(--grad);
  border-radius: var(--radius);
  padding: clamp(28px, 5vw, 44px) clamp(22px, 4vw, 40px);
  text-align: center; color: #fff;
  margin-top: 36px; margin-bottom: 40px;
  position: relative; overflow: hidden;
}
.fix-cta::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,.05);
  pointer-events: none;
}
.fix-cta-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.22);
  border-radius: var(--radius-pill); padding: 4px 14px;
  font-size: 11px; font-weight: 800; letter-spacing: .07em; text-transform: uppercase;
  color: rgba(255,255,255,.9); margin-bottom: 14px;
}
.fix-cta h2 { font-size: clamp(20px, 3.5vw, 28px); font-weight: 900; color: #fff; margin-bottom: 10px; line-height: 1.25; }
.fix-cta p { font-size: 14px; opacity: .8; max-width: 440px; margin: 0 auto 26px; line-height: 1.6; }
.fix-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.fix-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 12px 24px; border-radius: var(--radius-pill);
  font-family: inherit; font-size: 14px; font-weight: 800;
  text-decoration: none; cursor: pointer;

/* ============================== PRNG (deterministic fake ranks) ============================== */
function mulberry32(seed) {
  return function() { let t = seed += 0x6D2B79F5; t = Math.imul(t^t>>>15, t|1); t ^= t + Math.imul(t^t>>>7, t|61); return ((t^t>>>14)>>>0)/4294967296; };
}
function simRanks(id, vertical) {
  const seed = id.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
  const rng = mulberry32(seed);
  const iosOverall = Math.floor(rng() * 180) + 5;
  const catApps = CATALOGUE.filter(a => a.vertical === vertical).length || 5;
  const iosCat = Math.floor(rng() * catApps) + 1;
  return { iosOverall, iosCat, catApps };
}

/* ============================== iTunes API ============================== */
function catFallback(id) {
  const c = CATALOGUE.find(a => a.iosId === id);
  if (!c) return null;
  return { id, name: c.name, developer: c.developer, icon: '', rating: null, ratingCount: null, vertical: c.vertical };
}

async function fetchJSON(url, retries = 2) {
  let lastErr;
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    } catch (e) {
      lastErr = e;
      if (attempt < retries) await new Promise(r => setTimeout(r, 350 * (attempt + 1)));
    }
  }
  throw lastErr;
}

function appFromResult(r) {
  return {
    id: String(r.trackId),
    name: r.trackName,
    developer: r.artistName,
    icon: r.artworkUrl100,
    rating: r.averageUserRating ? Math.round(r.averageUserRating * 10) / 10 : null,
    ratingCount: r.userRatingCount || null,
    vertical: guessVertical(r),
    description: r.description || '',
    primaryGenre: r.primaryGenreName || '',
  };
}

async function searchItunes(q) {
  const url = `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&country=ae&entity=software&limit=12`;
  const data = await fetchJSON(url);
  return (data.results || []).filter(r => r.trackId).map(r => {
    const app = appFromResult(r);
    STATE.appCache[app.id] = app;
    return app;
  });
}

async function lookupItunes(id) {
  const url = `https://itunes.apple.com/lookup?id=${id}&country=ae`;
  const data = await fetchJSON(url);
  if (!data.results || !data.results[0]) throw new Error('not found');
  const app = appFromResult(data.results[0]);
  app.id = String(data.results[0].trackId || id);
  STATE.appCache[app.id] = app;
  STATE.appCache[id] = app;
  return app;
}

function guessVertical(r) {
  const match = CATALOGUE.find(c => String(c.iosId) === String(r.trackId));
  if (match) return match.vertical;
  const g = (r.primaryGenreName || r.genres?.[0] || '').toLowerCase();
  if (g.includes('finance') || g.includes('banking')) return 'banking';
  if (g.includes('travel') || g.includes('navigation')) return 'travel';
  if (g.includes('food') || g.includes('drink')) return 'fnb';
  if (g.includes('shopping')) return 'ecommerce';
  if (g.includes('health') || g.includes('medical') || g.includes('fitness')) return 'healthcare';
  if (g.includes('entertainment') || g.includes('music') || g.includes('photo') || g.includes('video') || g.includes('game') || g.includes('social') || g.includes('book')) return 'entertainment';
  return 'entertainment';
}

async function fetchReviews(id) {
  const url = `https://itunes.apple.com/ae/rss/customerreviews/id=${id}/sortBy=mostRecent/json`;
  const data = await fetchJSON(url);
  const entries = data.feed?.entry || [];
  const list = entries.filter(e => e['im:rating']).map(e => ({
    title: e.title?.label || '',
    text: e.content?.label || '',
    rating: parseInt(e['im:rating']?.label || '3'),
    author: e.author?.name?.label || 'Anonymous',
    date: e.updated?.label || '',
  }));
  STATE.reviewCache[id] = list;
  return list;
}

function synthReviews(id, iosReviews) {
  const seed = id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rng = mulberry32(seed + 9999);
  const templates = [
    { text:'App keeps crashing after the latest update. Very frustrating!', rating:1, cat:'crash' },
    { text:'Login is broken — OTP never arrives. Locked out for 3 days.', rating:1, cat:'login' },
    { text:'So slow! Every screen takes 10 seconds to load.', rating:2, cat:'perf' },
    { text:'The new UI is confusing. Hard to find anything.', rating:2, cat:'ui' },
    { text:'Push notifications stopped working completely.', rating:2, cat:'notif' },
    { text:'Payment failed twice but money was deducted!', rating:1, cat:'pay' },
    { text:'Customer support never replies. Completely ignored my issue.', rating:1, cat:'support' },
    { text:'Missing basic features that every competitor has.', rating:3, cat:'feature' },
    { text:'Great app! Very smooth and easy to use.', rating:5, cat:'' },
    { text:'Love the new update. Much better experience now.', rating:5, cat:'' },
    { text:'Works perfectly every time. Highly recommend!', rating:4, cat:'' },
    { text:'Decent app but needs improvement in performance.', rating:3, cat:'perf' },
  ];
  const count = Math.floor(rng() * 4) + 8;
  return Array.from({ length: count }, (_, i) => {
    const t = templates[Math.floor(rng() * templates.length)];
    return { ...t, author: 'User' + Math.floor(rng()*9000+1000), date: new Date(Date.now() - Math.floor(rng()*30)*86400000).toISOString() };
  });
}

];

function analyzeIssues(reviews) {
  const catRevs = {};
  ISSUE_CATS.forEach(c => { catRevs[c.key] = []; });
  reviews.forEach(r => {
    const txt = ((r.text||'')+(r.title||'')).toLowerCase();
    ISSUE_CATS.forEach(c => { if (c.kw.some(kw => txt.includes(kw))) catRevs[c.key].push(r); });
  });
  return ISSUE_CATS
    .map(c => ({ ...c, count: catRevs[c.key].length, reviews: catRevs[c.key] }))
    .filter(c => c.count > 0)
    .sort((a,b) => b.count - a.count)
    .slice(0, 6);
}

async function renderAudit(id) {
  if (!id) { go('#home'); return; }
  const c = $('#content');
  c.innerHTML = `
    <nav class="breadcrumb"><a href="#home" onclick="event.preventDefault();go('#home')">Home</a><i data-lucide="chevron-right"></i><span>App Audit</span></nav>
    <div style="padding:32px 0 20px;display:flex;align-items:center;gap:12px">
      <div class="skel" style="width:72px;height:72px;border-radius:18px;flex:none"></div>
      <div style="flex:1">
        <div class="skel" style="height:22px;width:55%;border-radius:6px;margin-bottom:8px"></div>
        <div class="skel" style="height:14px;width:35%;border-radius:6px"></div>
      </div>
    </div>
    <div id="auditContent"></div>
  `;
  refreshIcons();

  let app = STATE.appCache[id];
  if (!app) { try { app = await lookupItunes(id); } catch {} }
  if (!app) app = catFallback(id);
  if (!app) {
    c.innerHTML = `<div class="full-empty"><i data-lucide="wifi-off"></i><h3>Couldn't load this app</h3><p>The App Store API didn't respond. This is usually a temporary rate limit.</p><div style="display:flex;gap:8px;margin-top:6px"><button class="btn-ghost" onclick="renderAudit('${esc(id)}')"><i data-lucide="refresh-cw"></i> Try again</button><button class="btn-ghost" onclick="go('#search')"><i data-lucide="search"></i> New search</button></div></div>`;
    refreshIcons(); return;
  }

  const v = VERTICALS[app.vertical] || {};
  const ranks = simRanks(id, app.vertical);
  const catApps = CATALOGUE.filter(a => a.vertical === app.vertical);
  const catAvgRating = catApps.reduce((sum, a) => {
    const other = STATE.appCache[a.iosId];
    return sum + (other?.rating || 4.2);
  }, 0) / Math.max(catApps.length, 1);

  // Category leaderboard with this app included
  const lb = catApps.map(a => ({
    ...a,
    rank: simRanks(a.iosId, app.vertical).iosCat,
    isTarget: a.iosId === id,
    icon: STATE.appCache[a.iosId]?.icon || '',
    rating: STATE.appCache[a.iosId]?.rating || null,
    ratingCount: STATE.appCache[a.iosId]?.ratingCount || null,
  })).sort((a,b) => a.rank - b.rank).slice(0, 10);

  // If this app isn't in CATALOGUE, add it to the leaderboard
  if (!catApps.find(a => a.iosId === id)) {
    lb.push({ iosId: id, name: app.name, developer: app.developer, icon: app.icon, rating: app.rating, rank: ranks.iosCat, isTarget: true });
    lb.sort((a,b) => a.rank - b.rank);
  }

  const iconEl = app.icon
    ? `<img class="audit-icon" src="${esc(app.icon)}" alt="${esc(app.name)}" onerror="this.outerHTML='<div class=audit-icon-fallback>${v.emoji||'📱'}</div>'">`
    : `<div class="audit-icon-fallback">${v.emoji||'📱'}</div>`;

  const rankColor = ranks.iosCat <= 3 ? '#22C55E' : ranks.iosCat <= Math.ceil(ranks.catApps/2) ? '#F59E0B' : '#EF4444';
  const appRating = app.rating || 0;
  const avgRating = 4.2;
  const ratingDiff = appRating - avgRating;

  const box = $('#auditContent'); if (!box) return;
  box.innerHTML = `
    <div class="audit-app-head">
      ${iconEl}
      <div style="min-width:0;flex:1">
        <div class="audit-app-name">${esc(app.name)}</div>
        <div class="audit-app-dev">${esc(app.developer)}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px">
          ${vbadgeHTML(app.vertical)}
          ${app.rating ? `<span style="font-size:12.5px;color:var(--text-muted)">★ ${app.rating.toFixed(1)} · ${fmtNum(app.ratingCount)} ratings</span>` : ''}
        </div>
      </div>
      <div class="audit-actions">
        <button class="btn-ghost" onclick="go('#search')"><i data-lucide="search"></i> New search</button>
      </div>
    </div>

    <!-- SECTION 1: CATEGORY RANK -->
    <div class="compare-section">
      <div class="section-title">
        <div class="accent-bar" style="background:${v.color||'var(--primary)'}"></div>
        <h3>Category Rank — ${esc(v.label||app.vertical)} · 🇦🇪 UAE</h3>
      </div>

      <div class="rank-hero">
        <div>
          <div class="rank-big" style="color:${rankColor}">#${ranks.iosCat}</div>
          <div class="rank-label">of ${ranks.catApps} in ${esc(v.label||'your category')}</div>
        </div>
        <div style="flex:1;border-left:1px solid var(--border);padding-left:20px">
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px">Overall iOS Store Rank</div>
          <div style="font-size:22px;font-weight:900">#${ranks.iosOverall}</div>
          <div style="font-size:11.5px;color:var(--text-faint);margin-top:2px">UAE App Store · simulated*</div>
        </div>
      </div>

      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-label"><i data-lucide="star"></i> App Rating</div>
          <div class="metric-val">${appRating ? appRating.toFixed(1) : '—'}</div>
          <div class="metric-vs ${ratingDiff >= 0 ? 'up' : 'down'}">
            <i data-lucide="${ratingDiff >= 0 ? 'trending-up' : 'trending-down'}"></i>
            ${ratingDiff >= 0 ? '+' : ''}${ratingDiff.toFixed(1)} vs ${avgRating.toFixed(1)} avg
          </div>
        </div>
        <div class="metric-card">
          <div class="metric-label"><i data-lucide="users"></i> Reviews</div>
          <div class="metric-val">${fmtNum(app.ratingCount)}</div>
          <div class="metric-vs neutral"><i data-lucide="minus"></i> category avg varies</div>
        </div>
        <div class="metric-card">
          <div class="metric-label"><i data-lucide="trophy"></i> Position</div>
          <div class="metric-val">${ranks.iosCat <= 3 ? 'Top 3' : ranks.iosCat <= Math.ceil(ranks.catApps/2) ? 'Mid-tier' : 'Lower half'}</div>
          <div class="metric-vs ${ranks.iosCat <= 3 ? 'up' : ranks.iosCat <= Math.ceil(ranks.catApps/2) ? 'neutral' : 'down'}">
            <i data-lucide="${ranks.iosCat <= 3 ? 'trending-up' : ranks.iosCat <= Math.ceil(ranks.catApps/2) ? 'minus' : 'trending-down'}"></i>
            ${ranks.iosCat <= 3 ? 'Excellent' : ranks.iosCat <= Math.ceil(ranks.catApps/2) ? 'Room to grow' : 'Needs work'}
          </div>
        </div>
      </div>

      <div class="leaderboard">
        <div class="lb-head"><span>Rank</span><span>App</span><span style="text-align:right">Rating</span><span style="text-align:right">Reviews</span></div>
        ${lb.map((a, i) => {
          const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
          const iconHtml = a.icon
            ? `<img class="lb-icon" src="${esc(a.icon)}" alt="${esc(a.name)}" onerror="this.outerHTML='<div class=lb-icon-fb>${(VERTICALS[a.vertical]||{}).emoji||'📱'}</div>'">`
            : `<div class="lb-icon-fb">${(VERTICALS[a.vertical]||v).emoji||'📱'}</div>`;
          return `<div class="lb-row${a.isTarget ? ' is-target' : ''}">
            <div class="lb-rank ${rankClass}">#${a.rank}</div>
            <div class="lb-app">${iconHtml}<div><div class="lb-name">${esc(a.name)}</div><div class="lb-dev">${esc(a.developer||a.dev||'')}</div></div></div>
            <div class="lb-stat"><div class="lb-rating">${a.rating ? `<svg viewBox="0 0 24 24" width="12" height="12" fill="#FBBF24" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${a.rating.toFixed(1)}` : '—'}</div></div>
            <div class="lb-stat">${fmtNum(a.ratingCount||null)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- SECTION 2: ISSUES -->
    <div class="issues-section">
      <div class="section-title">
        <div class="accent-bar" style="background:#EF4444"></div>
        <h3>Top Issues Reported by Users</h3>
      </div>
      <div id="issueBox"><div style="color:var(--text-muted);font-size:13.5px;padding:12px 0;display:flex;align-items:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Analysing user reviews…</div></div>
    </div>

    <!-- SECTION 3: CTA -->
    <div id="ctaBox"></div>

    <p style="font-size:11px;color:var(--text-faint);padding:8px 0 24px">* Rankings are simulated for illustration. Live ranking data requires a paid provider (e.g. AppFollow, Sensor Tower). AppMonitor is not affiliated with Apple or Google.</p>
  `;
  refreshIcons();

  // Async: load reviews + issues
  (async () => {
    let reviews = STATE.reviewCache[id] || null;
    if (!reviews) { try { reviews = await fetchReviews(id); } catch {} }
    const allRevs = [...(reviews || []), ...synthReviews(id, reviews)];
    const issues = analyzeIssues(allRevs);
    const box = $('#issueBox'); if (!box) return;
    box.innerHTML = `<div style="font-size:11.5px;color:var(--text-muted);margin-bottom:12px">Analysed from ${allRevs.length} reviews (iOS live + Android simulated)</div>${issueCatsHTML(issues, allRevs.length)}`;
    const ctaBox = $('#ctaBox'); if (ctaBox) ctaBox.innerHTML = fixCtaHTML(app.name);
    refreshIcons();
  })();
}

/* ============================== EVENT DELEGATION ============================== */
document.addEventListener('click', (e) => {
  // Issue accordion toggle
  const toggle = e.target.closest('[data-toggle]');
  if (toggle) {
    const key = toggle.dataset.toggle;
    const body = document.querySelector(`[data-body="${key}"]`);
    const chev = toggle.querySelector('.issue-chevron');
    if (body) body.classList.toggle('open');
    if (chev) chev.classList.toggle('open');
    return;
  }
});

// Search inputs (delegated — rendered dynamically)
let heroTimer = null, pageTimer = null;
document.addEventListener('input', (e) => {
  if (e.target.matches('#heroSearch')) {
    const q = e.target.value.trim();
    clearTimeout(heroTimer);
    if (q.length < 2) { closeDD(); return; }
    heroTimer = setTimeout(() => liveSearch(q), 320);
  }
  if (e.target.matches('#pageSearch')) {
    const q = e.target.value.trim();
    clearTimeout(pageTimer);
    if (q.length < 2) return;
    pageTimer = setTimeout(() => go('#search/' + encodeURIComponent(q)), 380);
  }
});
document.addEventListener('keydown', (e) => {
  if (e.target.matches('#heroSearch') && e.key === 'Enter') {
    const q = e.target.value.trim();
    if (q) { closeDD(); go('#search/' + encodeURIComponent(q)); }
  }
  if (e.target.matches('#heroSearch') && e.key === 'Escape') { closeDD(); }
  if (e.target.matches('#pageSearch') && e.key === 'Enter') {
    const q = e.target.value.trim();
    if (q) go('#search/' + encodeURIComponent(q));
  }
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrap')) closeDD();
});

function closeDD() { const dd = $('#heroDD'); if (dd) dd.classList.remove('open'); }

async function liveSearch(q) {
  const dd = $('#heroDD'); if (!dd) return;
  dd.classList.add('open');
  dd.innerHTML = `<div class="dd-loader"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Searching…</div>`;
  try {
    const apps = await searchItunes(q);
    if (!apps.length) { dd.innerHTML = `<div class="dd-loader">No apps found for "${esc(q)}"</div>`; return; }
    dd.innerHTML = apps.slice(0, 7).map(a => {
      const iconEl = a.icon ? `<img class="dd-item-icon" src="${esc(a.icon)}" style="border-radius:9px;width:36px;height:36px;object-fit:cover" alt="">` : `<div class="dd-item-icon">${(VERTICALS[a.vertical]||{}).emoji||'📱'}</div>`;
      return `<div class="dd-item" onclick="closeDD();go('#audit/${esc(a.id)}')">${iconEl}<div><div class="dd-item-name">${esc(a.name)}</div><div class="dd-item-dev">${esc(a.developer)}</div></div></div>`;
    }).join('');
  } catch { dd.innerHTML = `<div class="dd-loader">Couldn't reach the App Store. Try again.</div>`; }
}
